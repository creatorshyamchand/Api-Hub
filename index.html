<!-- index.html - Complete working version -->
<!DOCTYPE html>
<html lang="en">
  <head>
  <script src="/scripts/runtime-error-reporter.js"></script>
  <script src="/scripts/vite-error-monitor.js"></script>
  <script src="/scripts/component-inspector.js"></script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="description" content="NExXON API Marketplace — Buy permanent API access with one-time payment" />
    <title>NExXON API MARKETPLACE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        background: #0a0a0a;
        color: #EEEEEE;
        font-family: 'Inter', sans-serif;
        overflow-x: hidden;
      }
      
      ::-webkit-scrollbar {
        width: 4px;
      }
      
      ::-webkit-scrollbar-track {
        background: #1a1a1a;
      }
      
      ::-webkit-scrollbar-thumb {
        background: #FF1744;
        border-radius: 10px;
      }
      
      /* Telegram Login Button Styling */
      .telegram-login-btn iframe {
        border-radius: 12px !important;
        box-shadow: 0 0 20px rgba(255, 23, 68, 0.2) !important;
        transition: all 0.3s ease !important;
      }
      
      .telegram-login-btn iframe:hover {
        transform: scale(1.02);
        box-shadow: 0 0 30px rgba(255, 23, 68, 0.4) !important;
      }
      
      /* Loading animation */
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      
      .loading-pulse {
        animation: pulse 1.5s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Telegram Login Widget - Global Callback -->
    <script>
      window.onTelegramAuth = function(user) {
        console.log('Telegram user authenticated:', user);
        // Dispatch custom event for React to catch
        window.dispatchEvent(new CustomEvent('telegram-login-success', { detail: user }));
      };
    </script>
  </body>
</html>
